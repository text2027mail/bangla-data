name: Advance Bookings Update

on:
  schedule:
    # Runs at 10:00, 16:00, 20:00, 23:00 IST daily
    # UTC times: 04:30, 10:30, 14:30, 17:30
    - cron: '30 4,10,14,17 * * *'
  workflow_dispatch:   # manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Advance script
        run: python advance.py

      - name: Commit and push updated JSONs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add advance/
          git diff --staged --quiet || git commit -m "Update advance bookings data [skip ci]"
          git push
